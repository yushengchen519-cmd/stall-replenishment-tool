<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>服装档口 · 补货工具</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: "Microsoft YaHei","PingFang SC","Segoe UI",sans-serif; background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 30%, #fef3c7 70%, #ecfdf5 100%); background-attachment: fixed; color:#444; min-height:100vh; }
.container { max-width:1200px; margin:0 auto; padding:20px; }

/* Header */
.header { background: white; border-radius:20px; padding:24px 30px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; box-shadow: 0 4px 20px rgba(236,72,153,0.1), 0 1px 3px rgba(0,0,0,0.04); border: 1px solid #fce7f3; }
.header h1 { font-size:24px; background: linear-gradient(135deg, #ec4899, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.header .date { font-size:14px; color:#999; }
.header-right { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

/* Stats bar */
.stats { display:flex; gap:14px; margin-bottom:20px; flex-wrap:wrap; }
.stat-card { flex:1; min-width:140px; background:white; border-radius:16px; padding:18px 16px; text-align:center; box-shadow: 0 2px 12px rgba(0,0,0,0.04); transition: transform 0.2s; border: 1px solid #f3f4f6; }
.stat-card:hover { transform: translateY(-2px); }
.stat-card .num { font-size:34px; font-weight:800; }
.stat-card .label { font-size:12px; color:#999; margin-top:4px; }
.stat-card.danger { border-left: 4px solid #f87171; }
.stat-card.danger .num { color:#ef4444; }
.stat-card.warning { border-left: 4px solid #fbbf24; }
.stat-card.warning .num { color:#f59e0b; }
.stat-card.success { border-left: 4px solid #34d399; }
.stat-card.success .num { color:#10b981; }
.stat-card.info { border-left: 4px solid #60a5fa; }
.stat-card.info .num { color:#3b82f6; }

/* Controls */
.controls { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
.controls label { font-size:13px; color:#888; font-weight:600; }
.btn { padding:8px 18px; border:none; border-radius:25px; cursor:pointer; font-size:13px; font-weight:600; transition:all 0.2s; letter-spacing:0.3px; }
.btn-primary { background: linear-gradient(135deg, #ec4899, #f43f5e); color:white; box-shadow: 0 3px 12px rgba(236,72,153,0.25); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(236,72,153,0.35); }
.btn-outline { background:white; border:2px solid #f9a8d4; color:#ec4899; }
.btn-outline:hover { background:#fdf2f8; border-color:#ec4899; }
.btn-green { background: linear-gradient(135deg, #34d399, #10b981); color:white; box-shadow: 0 3px 12px rgba(52,211,153,0.25); }
.btn-green:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(52,211,153,0.35); }
.btn-sm { padding:5px 14px; font-size:11px; }
select, input[type="text"], input[type="number"] { background:white; border:2px solid #f3f4f6; color:#444; padding:8px 14px; border-radius:25px; font-size:13px; transition:border-color 0.2s; }
select:focus, input:focus { outline:none; border-color:#f9a8d4; box-shadow: 0 0 0 3px rgba(249,168,212,0.15); }

/* Table */
.table-wrap { background:white; border-radius:20px; overflow:hidden; margin-bottom:20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.03); overflow-x:auto; -webkit-overflow-scrolling:touch; }
.table-wrap::after { content:''; position:sticky; right:0; top:0; bottom:0; width:24px; background:linear-gradient(90deg,transparent,rgba(236,72,153,0.06)); pointer-events:none; display:none; }
table { width:100%; border-collapse:collapse; }
th { background: linear-gradient(180deg, #fdf2f8, #fce7f3); padding:14px 10px; text-align:left; font-size:11px; color:#be185d; text-transform:uppercase; letter-spacing:0.8px; position:sticky; top:0; z-index:1; border-bottom: 2px solid #fbcfe8; white-space:nowrap; }
td { padding:11px 10px; border-bottom:1px solid #fef3c7; font-size:13px; white-space:nowrap; }
td.wrap { white-space:normal; }
tr:nth-child(even) td { background:#fefce8; }
tr:hover td { background:#fdf2f8 !important; }
tr.selected td { background:#ffe4e6 !important; }
tr.group-header td { background: linear-gradient(90deg, #fce7f3, #fef3c7) !important; font-weight:bold; font-size:14px; color:#be185d; cursor:pointer; border-bottom: 1px solid #fbcfe8; }
tr.group-header td:hover { background: linear-gradient(90deg, #fbcfe8, #fde68a) !important; }

.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
.badge-danger { background:#fee2e2; color:#dc2626; }
.badge-warning { background:#fef3c7; color:#d97706; }
.badge-success { background:#d1fae5; color:#059669; }

.qty-input { width:60px; text-align:center; background:white; border:2px solid #fbcfe8; color:#444; padding:6px; border-radius:20px; font-size:14px; font-weight:700; }
.qty-input:focus { border-color:#ec4899; outline:none; box-shadow: 0 0 0 3px rgba(236,72,153,0.12); }
.qty-input:disabled { opacity:0.25; background:#f9fafb; }

.checkbox { width:20px; height:20px; accent-color:#ec4899; cursor:pointer; }

/* Summary */
.summary { background:white; border-radius:20px; padding:24px; margin-bottom:20px; display:none; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 2px solid #fce7f3; }
.summary.active { display:block; animation: fadeUp 0.3s ease; }
.summary h3 { color:#ec4899; margin-bottom:16px; font-size:17px; }
.summary-table { width:100%; border-collapse:collapse; margin-bottom:16px; }
.summary-table th { background:#fdf2f8; padding:10px 8px; font-size:11px; color:#be185d; border-radius:0; }
.summary-table td { padding:10px 8px; border-bottom:1px solid #fef3c7; font-size:13px; background:white; }
.summary-total { text-align:right; font-size:17px; color:#10b981; font-weight:800; margin-top:8px; background:#f0fdf4; padding:12px 16px; border-radius:12px; }

/* Toast */
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background: linear-gradient(135deg, #34d399, #10b981); color:white; padding:12px 28px; border-radius:30px; font-size:14px; font-weight:600; z-index:100; opacity:0; transition:opacity 0.3s; box-shadow: 0 4px 16px rgba(52,211,153,0.3); }
.toast.show { opacity:1; }
.toast.error { background: linear-gradient(135deg, #f87171, #ef4444); box-shadow: 0 4px 16px rgba(239,68,68,0.3); }

/* Print */
@media print {
  body { background:white; color:black; }
  .header, .stats, .controls, .btn, .checkbox, .qty-input, .summary, .toast, .no-print { display:none !important; }
  .table-wrap { background:white; border:1px solid #ccc; box-shadow:none; }
  th { background:#eee; color:black; }
  td { color:black; border-color:#ddd; }
  .badge-danger, .badge-warning, .badge-success { color:black; background:none; font-weight:bold; }
}

/* Mode toggle buttons */
.mode-btn { padding:6px 16px; border:none; border-radius:22px; cursor:pointer; font-size:13px; font-weight:600; background:transparent; color:#999; transition:all 0.2s; white-space:nowrap; }
.mode-btn.active { background:linear-gradient(135deg,#ec4899,#f43f5e); color:white; box-shadow:0 2px 8px rgba(236,72,153,0.2); }
.mode-btn:hover:not(.active) { color:#ec4899; background:#fdf2f8; }

@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.empty-state { text-align:center; padding:40px; color:#999; }
.empty-state .icon { font-size:48px; margin-bottom:12px; }

/* === Mobile: portrait phones === */
@media (max-width: 768px) {
  .container { padding:10px; }
  
  /* Header */
  .header { padding:16px; border-radius:14px; flex-direction:column; align-items:stretch; }
  .header h1 { font-size:18px; }
  .header .date { font-size:12px; }
  .header-right { gap:6px; }
  .header-right .btn { flex:1; text-align:center; padding:8px 6px; font-size:11px; border-radius:20px; min-width:0; }
  .header-right .btn-sm { font-size:10px; padding:6px 8px; }
  
  /* Stats */
  .stats { gap:8px; }
  .stat-card { min-width:0; flex:1 1 calc(50% - 8px); padding:12px 8px; border-radius:12px; }
  .stat-card .num { font-size:26px; }
  .stat-card .label { font-size:10px; }
  
  /* Controls */
  .controls { gap:8px; }
  .controls label { font-size:11px; }
  .controls select { font-size:12px; padding:6px 10px; max-width:100px; }
  
  /* Table - scrollable on desktop, compact on mobile */
  .table-wrap { border-radius:14px; }
  .table-wrap::after { display:none; }
  table { min-width:0; }
  th { padding:10px 6px; font-size:9px; }
  td { padding:9px 6px; font-size:12px; }
  
  /* Hide non-essential columns on mobile */
  .mob-hide { display:none !important; }
  
  /* Touch-friendly checkboxes and inputs */
  .checkbox { width:24px; height:24px; }
  .qty-input { width:52px; font-size:15px; padding:8px 4px; }
  .badge { font-size:10px; padding:2px 7px; }
  
  /* Summary */
  .summary { padding:16px; border-radius:14px; }
  .summary h3 { font-size:15px; }
  .summary-table th, .summary-table td { font-size:11px; padding:6px 4px; }
  .summary-total { font-size:14px; }
  
  /* Buttons in summary */
  .summary .btn { font-size:12px; padding:8px 14px; }
  
  /* Print panel adjustments */
  .doc-header h1 { font-size:20px; }
  .doc-header .date { font-size:13px; }
}

/* === Very small phones === */
@media (max-width: 400px) {
  .container { padding:6px; }
  .header { padding:12px; border-radius:10px; }
  .header h1 { font-size:16px; }
  .header-right .btn { font-size:10px; padding:6px 4px; }
  .stat-card { padding:10px 6px; }
  .stat-card .num { font-size:22px; }
  .controls { flex-direction:column; gap:6px; }
  .controls select { max-width:100%; width:100%; }
}
</style>
</head>

// Split total stock into shelf + warehouse
inventory.forEach(function(item) {
  var total = item.current_stock;
  item.shelf = Math.min(item.safety, Math.max(0, total));
  item.wh = Math.max(0, total - item.shelf) + 3;
  item.shelf_safety = item.safety;
  item.wh_safety = Math.round(item.safety * 1.5);
});



// ===== DATA PERSISTENCE (localStorage) =====
var STORAGE_KEY = 'stall_inventory_v1';

function saveData() {
  var saveData = inventory.map(function(item) {
    return {code:item.code,size:item.size,color:item.color, shelf:item.shelf, wh:item.wh, shelf_safety:item.shelf_safety, wh_safety:item.wh_safety};
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saveData));
}

function loadData() {
  var raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return false;
  try {
    var saved = JSON.parse(raw);
    saved.forEach(function(s) {
      for (var i = 0; i < inventory.length; i++) {
        if (inventory[i].code === s.code && inventory[i].size === s.size && inventory[i].color === s.color) {
          inventory[i].shelf = s.shelf;
          inventory[i].wh = s.wh;
          inventory[i].shelf_safety = s.shelf_safety;
          inventory[i].wh_safety = s.wh_safety;
          break;
        }
      }
    });
    return true;
  } catch(e) { return false; }
}

function exportDataTSV() {
  var lines = ['商品编号\t尺码\t颜色\t摊位库存\t摊位安全线\t仓库库存\t仓库安全线\t总库存'];
  inventory.forEach(function(item) {
    lines.push([item.code, item.size, item.color, item.shelf, item.shelf_safety, item.wh, item.wh_safety, item.shelf+item.wh].join('\t'));

  var text = lines.join('\n');
  navigator.clipboard.writeText(text).then(function() {

    var ta = document.createElement('textarea');

    ta.style.cssText = 'position:fixed;top:10%;left:10%;width:80%;height:60%;z-index:999;background:white;border:2px solid #ec4899;border-radius:10px;padding:16px;font-family:monospace;font-size:12px;';

function resetData() {
  if (!confirm('确定要重置所有库存数据吗？这将恢复为初始值，且不可撤销。')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STORAGE_KEY + '_v2');
  inventory.forEach(function(item) {
    var total = item.current_stock;
    item.shelf = Math.min(item.safety, Math.max(0, total));
    item.wh = Math.max(0, total - item.shelf) + 3;
    item.shelf_safety = item.safety;
    item.wh_safety = Math.round(item.safety * 1.5);
  });
  selections = {};
  whSelections = {};
  render();
  showToast('数据已重置 🔄');
}

// ===== INIT =====
function init() {
  document.getElementById('todayDate').textContent = '📅 ' + new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  // Populate category filter
  var cats = [...new Set(inventory.map(i=>i.category))];
  var selCat = document.getElementById('filterCategory');
  cats.forEach(c => { var o=document.createElement('option'); o.value=c; o.textContent=c; selCat.appendChild(o); });
  // Populate code filter
  var codes = [...new Set(inventory.map(i=>i.code))];
  var selCode = document.getElementById('filterCode');
  codes.forEach(c => { var o=document.createElement('option'); o.value=c; o.textContent=c; selCode.appendChild(o); });
  // Populate name filter
  var names = [...new Set(inventory.map(i=>i.name))];
  var selName = document.getElementById('filterName');
  names.forEach(n => { var o=document.createElement('option'); o.value=n; o.textContent=n; selName.appendChild(o); });
  updateThead();
  var hasData = loadData();
  if (!hasData) { saveData(); }
  render();
}

function getFilteredData() {
  var code = document.getElementById('filterCode').value;
  var name = document.getElementById('filterName').value;
  var cat = document.getElementById('filterCategory').value;
  var status = document.getElementById('filterStatus').value;
  return inventory.filter(function(item) {
    if (code !== 'all' && item.code !== code) return false;
    if (name !== 'all' && item.name !== name) return false;
    if (cat !== 'all' && item.category !== cat) return false;
    var stock = viewMode === 'daily' ? item.shelf : item.wh;
    var safe = viewMode === 'daily' ? item.shelf_safety : item.wh_safety;
    if (status === 'needs') return stock < safe;
    if (status === 'out') return stock <= 0;
    if (status === 'low') return stock > 0 && stock < safe;
    return true;
  });
}

function render() {
  var data = getFilteredData();
  var tbody = document.getElementById('skuBody');
  
  var groups = {};
  data.forEach(function(item, idx) {
    if (!groups[item.category]) groups[item.category] = [];
    groups[item.category].push({item:item, origIdx:inventory.indexOf(item)});
  });

  var isMobile = window.innerWidth <= 768;
  var isDaily = viewMode === 'daily';
  
  function isSelected(idx) {
    var sels = isDaily ? selections : whSelections;
    return sels[idx] !== undefined;
  }
  
  // Column defs: always=true means always show. mob=true means HIDE on mobile. daily=true means HIDE in daily mode.
  var colDefs = [
    {h:'☑',        a:1, m:0, d:0, r:function(it,ix){return '<input type="checkbox" class="checkbox" '+(isSelected(ix)?'checked':'')+' onchange="toggleSelect('+ix+',this)">';}},
    {h:'商品编号', a:1, m:0, d:0, r:function(it,ix){return it.code;}},
    {h:'品类',     a:0, m:1, d:1, r:function(it,ix){return it.category;}},
    {h:'品牌',     a:0, m:1, d:1, r:function(it,ix){return it.brand;}},
    {h:'款式名称', a:1, m:0, d:0, r:function(it,ix){return it.name;}},
    {h:'尺码',     a:1, m:0, d:0, r:function(it,ix){return it.size;}},
    {h:'颜色',     a:1, m:0, d:0, r:function(it,ix){return it.color;}},
    {h:'存放位置', a:0, m:1, d:1, r:function(it,ix){return it.location;}},
    {h:'当前库存', a:1, m:0, d:0, r:function(it,ix){
      var s = it.wh;
      var sf = it.wh_safety;
      return '<span style="font-weight:bold;color:'+(s<=0?'#ef4444':s<sf?'#f59e0b':'#10b981')+'">'+s+'</span>';
    }},
    {h:'安全库存', a:0, m:1, d:1, r:function(it,ix){return isDaily ? it.shelf_safety : it.wh_safety;}},
    {h:'状态',     a:0, m:1, d:1, r:function(it,ix){
      var s = isDaily ? it.shelf : it.wh;
      var sf = isDaily ? it.shelf_safety : it.wh_safety;
      var st = s <= 0 ? '缺货' : (s < sf ? '不足' : '充足');
      return '<span class="badge badge-'+(st==='缺货'?'danger':st==='不足'?'warning':'success')+'">'+st+'</span>';
    }},
    {h:'建议补货', a:0, m:1, d:1, r:function(it,ix){
      var s = isDaily ? it.shelf : it.wh;
      var sf = isDaily ? it.shelf_safety : it.wh_safety;
      var sug = Math.max(0, sf - s);
      return sug > 0 ? '<span style="color:#f59e0b">'+sug+'</span>' : '-';
    }},
    {h:isDaily?'补货':'进货', a:1, m:0, d:0, r:function(it,ix){
      var sels = isDaily ? selections : whSelections;
      var s = isDaily ? it.shelf : it.wh;
      var sf = isDaily ? it.shelf_safety : it.wh_safety;
      var sug = Math.max(0, sf - s);
      var sel = sels[ix] !== undefined;
      var qty = sel ? sels[ix] : 0;
      // Daily: always enabled (user enters manually from shelf check)
      // Warehouse: disabled unless selected or stock < safety
      var disabled = isDaily ? '' : (sel||(s<sf)?'':'disabled');
      return '<input type="number" class="qty-input" value="'+qty+'" min="0" '+disabled+' oninput="updateQty('+ix+',this.value,this)" onclick="event.stopPropagation()">';
    }},
    {h:'供应商',   a:0, m:1, d:1, r:function(it,ix){return suppliers[it.code]||'-';}},
    {h:'成本单价', a:0, m:1, d:1, r:function(it,ix){var c=costs[it.code]||0;return '$'+c.toFixed(2);}},
    {h:'小计(SGD)',a:0, m:1, d:1, r:function(it,ix){
      var sels = isDaily ? selections : whSelections;
      var qty = sels[ix] || 0;
      return '<span style="color:#10b981;font-weight:bold">$'+(qty*(costs[it.code]||0)).toFixed(2)+'</span>';
    }}
  ];
  
  // Filter visible: daily-hide columns are hidden regardless of other flags
  var vis = [];
  for (var i = 0; i < colDefs.length; i++) {
    if (isDaily && colDefs[i].d) continue;
    if (isMobile && colDefs[i].m) continue;
    vis.push(i);
  }
  var colspan = vis.length;

  var html = '';
  var catOrder = ['内衣','内裤','袜子','裤袜'];
  catOrder.forEach(function(cat) {
    if (!groups[cat]) return;
    var items = groups[cat];
    html += '<tr class="group-header" onclick="toggleCategory(this,\''+cat+'\')"><td colspan="'+colspan+'">📂 '+cat+' ('+items.length+' SKU)</td></tr>';
    items.forEach(function(entry) {
      var it = entry.item, ix = entry.origIdx;
      html += '<tr class="sku-row cat-'+cat+' '+(isSelected(ix)?'selected':'')+'" data-idx="'+ix+'">';
      for (var v = 0; v < vis.length; v++) {
        html += '<td>'+colDefs[vis[v]].r(it, ix)+'</td>';
      }
      html += '</tr>';
    });
  });

  tbody.innerHTML = html;
  updateStats();
  updateSummary();
}function toggleSelect(idx, cb) {
  var item = inventory[idx];
  var isDaily = viewMode === 'daily';
  var sels = isDaily ? selections : whSelections;
  var stock = isDaily ? item.shelf : item.wh;
  var safe = isDaily ? item.shelf_safety : item.wh_safety;
  var sug = Math.max(0, safe - stock);
  if (cb.checked) {
    // Daily: can't take more than warehouse has
    var maxQty = isDaily ? item.wh : 9999;
    var defQty = sug > 0 ? sug : (safe - Math.max(0, stock));
    sels[idx] = Math.min(defQty, Math.max(0, maxQty));
    if (isDaily && maxQty <= 0) {
      showToast('仓库库存不足，请先补仓库！', true);
      delete sels[idx];
      render();
      return;
    }
  } else {
    delete sels[idx];
  }
  render();
}

function updateQty(idx, val, inputEl) {
  var qty = parseInt(val) || 0;
  var isDaily = viewMode === 'daily';
  var sels = isDaily ? selections : whSelections;
  var item = inventory[idx];
  // Daily: hard cap to warehouse stock, reflect in DOM immediately
  if (isDaily && qty > item.wh) {
    qty = item.wh;
    if (inputEl) inputEl.value = qty;
    showToast('最多补 '+item.wh+' 件（仓库余量）', true);
  }
  if (qty <= 0) {
    delete sels[idx];
  } else {
    sels[idx] = qty;
  }
  updateSummary();
  var cost = costs[inventory[idx].code] || 0;
  var subtotal = (qty * cost).toFixed(2);
  var row = document.querySelector('tr[data-idx="'+idx+'"]');
  if (row) {
    var subCell = row.querySelector('.subtotal-val');
    if (subCell) subCell.textContent = '$'+subtotal;
  }
}

function updateStats() {
  var data = getFilteredData();
  var all = inventory;
  var isDaily = viewMode === 'daily';
  var outOfStock = all.filter(function(i) {
    var s = isDaily ? i.shelf : i.wh;
    var sf = isDaily ? i.shelf_safety : i.wh_safety;
    return s <= 0;
  }).length;
  var lowStock = all.filter(function(i) {
    var s = isDaily ? i.shelf : i.wh;
    var sf = isDaily ? i.shelf_safety : i.wh_safety;
    return s > 0 && s < sf;
  }).length;
  var adequate = all.filter(function(i) {
    var s = isDaily ? i.shelf : i.wh;
    var sf = isDaily ? i.shelf_safety : i.wh_safety;
    return s >= sf;
  }).length;
  var needReplenish = all.filter(function(i) {
    var s = isDaily ? i.shelf : i.wh;
    var sf = isDaily ? i.shelf_safety : i.wh_safety;
    return s < sf;
  }).length;
  
  var isDaily = viewMode === 'daily';
  if (isDaily) {
    document.getElementById('statsBar').innerHTML = '<div class="stat-card info" style="flex:1;text-align:center"><div class="num" style="font-size:20px">🏪</div><div class="label">摊位补货模式 — 从仓库调拨</div></div>';
  } else {
    document.getElementById('statsBar').innerHTML = 
      '<div class="stat-card danger"><div class="num">'+outOfStock+'</div><div class="label">缺货(仓库)</div></div>'+
      '<div class="stat-card warning"><div class="num">'+lowStock+'</div><div class="label">库存不足(仓库)</div></div>'+
      '<div class="stat-card success"><div class="num">'+adequate+'</div><div class="label">库存充足(仓库)</div></div>'+
      '<div class="stat-card info"><div class="num">'+needReplenish+'</div><div class="label">需进货合计</div></div>';
  }
  
  var selsActive = viewMode === 'daily' ? selections : whSelections;
  var selCount = Object.keys(selsActive).length;
  var actionLabel = isDaily ? '已选补货' : '已选进货';
  document.getElementById('selectedCount').textContent = actionLabel + ': '+selCount+' 项';
}

function updateSummary() {
  var panel = document.getElementById('summaryPanel');
  var tbody = document.getElementById('summaryTable');
  var totalEl = document.getElementById('summaryTotal');
  
  var selsActive = viewMode === 'daily' ? selections : whSelections;
  var selected = Object.keys(selsActive).map(Number);
  if (selected.length === 0) {
    panel.classList.remove('active');
    return;
  }
  panel.classList.add('active');
  var modeLabel = viewMode === 'daily' ? '📋 摊位补货清单（从仓库调拨）' : '📋 仓库进货清单（供应商采购）';
  document.querySelector('#summaryPanel h3').textContent = modeLabel;
  
  var isDaily = viewMode === 'daily';
  var html = isDaily
    ? '<tr><th>商品编号</th><th>款式</th><th>尺码</th><th>颜色</th><th>数量</th><th>来源</th></tr>'
    : '<tr><th>商品编号</th><th>款式</th><th>尺码</th><th>颜色</th><th>数量</th><th>供应商</th></tr>';
  var totalItems = 0;
  selected.forEach(function(idx) {
    var item = inventory[idx];
    var qty = selsActive[idx];
    totalItems += qty;
    html += '<tr>';
    html += '<td>'+item.code+'</td><td>'+item.name+'</td><td>'+item.size+'</td><td>'+item.color+'</td>';
    html += '<td>'+qty+'</td>';
    html += '<td>'+(isDaily ? '📦 仓库调拨' : (suppliers[item.code]||'-'))+'</td>';
    html += '</tr>';
  });
  tbody.innerHTML = html;
  var label = isDaily ? '📦 摊位补货（从仓库调拨）' : '🏭 仓库进货（供应商采购）';
  totalEl.innerHTML = label + ' — 总件数: <span style="font-size:22px;">'+totalItems+' 件</span> （'+selected.length+' 项）';
}

function toggleAllItems() {
  showAll = !showAll;
  document.getElementById('filterStatus').value = showAll ? 'all' : 'needs';
  render();
}

function selectAllNeeding() {
  var data = getFilteredData();
  var isDaily = viewMode === 'daily';
  var sels = isDaily ? selections : whSelections;
  data.forEach(function(item) {
    var idx = inventory.indexOf(item);
    var stock = isDaily ? item.shelf : item.wh;
    var safe = isDaily ? item.shelf_safety : item.wh_safety;
    var sug = Math.max(0, safe - stock);
    if (stock < safe) {
      var maxQty = isDaily ? item.wh : 9999;
      sels[idx] = Math.min(sug > 0 ? sug : (safe - Math.max(0, stock)), maxQty);
    }
  });
  render();
}

function clearAll() {
  if (viewMode === 'daily') selections = {};
  else whSelections = {};
  render();
}

function generateList() {

  var selected = Object.keys(selsActive).map(Number);
  if (selected.length === 0) {
    showToast('请先勾选需要补货的SKU 🌸', true);
    return;
  }
  
  // APPLY replenishment to data model
  selected.forEach(function(idx) {
    var item = inventory[idx];
    var qty = selsActive[idx];
    if (isDaily) {
      // Shelf replenish: take from warehouse
      item.shelf += qty;
      item.wh = Math.max(0, item.wh - qty);
    } else {
      // Warehouse replenish: order from supplier
      item.wh += qty;
    }
  });
  
  // Clear selections after applying
  if (isDaily) selections = {}; else whSelections = {};
  // Auto-save to localStorage
  saveData();
  
  // Group by supplier (only warehouse mode needs suppliers)

    var item = inventory[idx];

  printHTML += '.summary-box .row{display:flex;justify-content:space-between;font-size:14px;padding:4px 0}';
  printHTML += '.summary-box .total{font-size:20px;font-weight:800;color:#ec4899;margin-top:8px;padding-top:8px;border-top:1px dashed #fbcfe8}';
  printHTML += '.footer{text-align:center;color:#bbb;font-size:11px;margin-top:30px}';
  printHTML += '@media print{body{padding:20px 30px}}';
  printHTML += '</style></head><body>';

  printHTML += '</div>';
  
  printHTML += '<div class="footer">服装档口管理模板 · 补货工具生成</div>';
  printHTML += '<script>window.onload=function(){window.print();}<'+'/script>';
  printHTML += '</body></html>';
  
  var w = window.open('', '_blank', 'width=900,height=700');
  w.document.write(printHTML);
  w.document.close();
  
  // Also update in-page summary
  updateSummary();
  var modeLabel = isDaily ? '摊位补货完成（仓库→摊位）' : '仓库进货完成（供应商→仓库）';
  showToast(modeLabel + ' ✅ 库存已更新');
}

function printList() {
  window.print();
}

function copyAsText() {
  var selsActive = viewMode === 'daily' ? selections : whSelections;
  var selected = Object.keys(selsActive).map(Number);
  if (selected.length === 0) return;
  var isDaily = viewMode === 'daily';
  var lines = isDaily
    ? ['日期\t商品编号\t款式名称\t尺码\t颜色\t补货数量\t来源']
    : ['日期\t商品编号\t款式名称\t尺码\t颜色\t补货数量\t供应商'];
  var total = 0;
  selected.forEach(function(idx) {
    var item = inventory[idx];
    var qty = selsActive[idx];
    var cost = costs[item.code] || 0;
    var amt = qty * cost;
    total += amt;
    lines.push(['', item.code, item.name, item.size, item.color, qty, cost.toFixed(2), amt.toFixed(2), suppliers[item.code]||''].join('\t'));
  });
  lines.push(isDaily ? ['', '', '', '', '', ''].join('\t') : ['', '', '', '', '', ''].join('\t'));
  navigator.clipboard.writeText(lines.join('\n')).then(function() {
    showToast('已复制到剪贴板 📋');
  }).catch(function() {
    showToast('复制失败，请手动选择表格', true);
  });
}

function downloadImage() {
  var isDaily = viewMode === 'daily';
  var selsActive = isDaily ? selections : whSelections;
  var selected = Object.keys(selsActive).map(Number);
  if (selected.length === 0) { showToast('请先勾选需要补货的SKU', true); return; }
  
  var today = new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
  var W = isDaily ? 440 : 520, rowH = 32, headerH = 36;
  var colX, colW, colNames, colAlign, nCols;
  if (isDaily) {
    // Daily: 4 columns (no 供应商)
    nCols = 4;
    colX = [12, 100, 300, 360];
    colW = [88, 200, 60, 60];
    colNames = ['商品编号', '款式名称', '尺码', '颜色'];
    colAlign = ['left','left','center','center'];
  } else {
    nCols = 5;
    colX = [12, 100, 300, 360, 420];
    colW = [88, 200, 60, 60, 80];
    colNames = ['商品编号', '款式名称', '尺码', '颜色', '供应商'];
    colAlign = ['left','left','center','center','left'];
  }
  
  var rows = [];
  var totalItems = 0;
  selected.forEach(function(idx) {
    var item = inventory[idx];
    var qty = selsActive[idx];
    totalItems += qty;
    var rowData = isDaily ? [item.code, item.name, item.size, item.color] : [item.code, item.name, item.size, item.color, suppliers[item.code]||'-'];
    rows.push(rowData);
  });
  
  var titleY = 50, tableY = 90;
  var tableH = headerH + rows.length * rowH;
  var svgH = tableY + tableH + 80;
  
  function svgTag(tag, attrs, content) {
    var s = '<'+tag;
    for (var k in attrs) s += ' '+k+'="'+attrs[k]+'"';
    if (content !== undefined) s += '>'+content+'</'+tag+'>';
    else s += '/>';
    return s;
  }
  
  var svg = '';
  svg += '<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+svgH+'" style="background:#fff;font-family:Microsoft YaHei,PingFang SC,sans-serif">';
  
  // Title
  svg += svgTag('text', {x:String(W/2), y:String(titleY), 'text-anchor':'middle', 'font-size':'22', 'font-weight':'bold', fill:'#ec4899'}, '📋 服装档口 · 补货清单');
  svg += svgTag('text', {x:String(W/2), y:String(titleY+22), 'text-anchor':'middle', 'font-size':'13', fill:'#999'}, '📅 '+today);
  
  // Table background
  svg += svgTag('rect', {x:String(12), y:String(tableY), width:String(W-24), height:String(tableH), rx:'8', fill:'#fdf2f8'});
  
  // Header row
  svg += svgTag('rect', {x:String(12), y:String(tableY), width:String(W-24), height:String(headerH), rx:'8', fill:'#fce7f3'});
  svg += svgTag('rect', {x:String(12), y:String(tableY+headerH/2), width:String(W-24), height:String(headerH/2), fill:'#fce7f3'});
  
  for (var c = 0; c < nCols; c++) {
    var ax = colAlign[c] === 'center' ? 'middle' : 'start';
    var tx = colAlign[c] === 'center' ? colX[c]+colW[c]/2 : colX[c]+10;
    svg += svgTag('text', {x:String(tx), y:String(tableY+22), 'text-anchor':ax, 'font-size':'11', 'font-weight':'bold', fill:'#be185d'}, colNames[c]);
  }
  
  // Data rows
  for (var r = 0; r < rows.length; r++) {
    var ry = tableY + headerH + r * rowH;
    if (r % 2 === 1) {
      svg += svgTag('rect', {x:String(12), y:String(ry), width:String(W-24), height:String(rowH), fill:'#fefce8'});
    }
    svg += svgTag('line', {x1:String(16), y1:String(ry+rowH), x2:String(W-16), y2:String(ry+rowH), stroke:'#fef3c7', 'stroke-width':'0.5'});
    
    for (var c = 0; c < nCols; c++) {
      var ax = colAlign[c] === 'center' ? 'middle' : 'start';
      var tx = colAlign[c] === 'center' ? colX[c]+colW[c]/2 : colX[c]+8;
      var fw = (c === (nCols-1)) ? 'bold' : 'normal';
      svg += svgTag('text', {x:String(tx), y:String(ry+21), 'text-anchor':ax, 'font-size':'12', 'font-weight':fw, fill:'#444'}, rows[r][c]);
    }
  }
  
  // Summary
  var sby = tableY + tableH + 20;
  svg += svgTag('rect', {x:String(12), y:String(sby), width:String(W-24), height:'56', rx:'12', fill:'#fdf2f8', stroke:'#fbcfe8', 'stroke-width':'2'});
  svg += svgTag('text', {x:String(32), y:String(sby+24), 'font-size':'14', fill:'#666'}, '补货 SKU: '+selected.length+' 项');
  svg += svgTag('text', {x:String(32), y:String(sby+46), 'font-size':'14', fill:'#666'}, '补货总件数: '+totalItems+' 件');
  
  svg += '</svg>';
  
  // Convert SVG to PNG via Canvas
  var canvas = document.createElement('canvas');
  canvas.width = W * 2;
  canvas.height = svgH * 2;
  var ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  
  var img = new Image();
  var svgBlob = new Blob([svg], {type:'image/svg+xml;charset=utf-8'});
  var url = URL.createObjectURL(svgBlob);
  
  img.onload = function() {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, svgH);
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    
    canvas.toBlob(function(blob) {
      var file = new File([blob], '补货清单_'+today.replace(/[年月]/g,'-').replace('日','')+'.png', {type:'image/png'});
      
      // Try Web Share API (iOS/Android share sheet → Save Image)
      if (navigator.canShare && navigator.canShare({files: [file]})) {
        navigator.share({files: [file], title: '补货清单'}).then(function() {
          showToast('已保存 📱');
        }).catch(function() {
          // Fallback: download
          downloadBlob(blob, today);
        });
      } else {
        downloadBlob(blob, today);
      }
    }, 'image/png');
  };
  
  img.onerror = function() {
    showToast('生成失败，请重试', true);
  };
  
  img.src = url;
}

function downloadBlob(blob, today) {
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '补货清单_'+today.replace(/[年月]/g,'-').replace('日','')+'.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('图片已保存 💾');
}

function toggleCategory(el, cat) {
  var rows = document.querySelectorAll('.cat-'+cat);
  var hidden = rows[0] && rows[0].style.display === 'none';
  rows.forEach(function(r) { r.style.display = hidden ? '' : 'none'; });
  el.querySelector('td').textContent = (hidden ? '📂' : '📁') + ' '+cat+' ('+rows.length+' SKU)';
}

function showToast(msg, isError) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast '+(isError?'error':'')+' show';
  setTimeout(function(){ t.className = 'toast'; }, 2000);
}

function switchMode(mode) {
  viewMode = mode;
  document.getElementById('btnDaily').className = mode === 'daily' ? 'mode-btn active' : 'mode-btn';
  document.getElementById('btnWarehouse').className = mode === 'warehouse' ? 'mode-btn active' : 'mode-btn';
  // Clear selections when switching modes
  updateThead();
  render();
}

function updateThead() {
  var isDaily = viewMode === 'daily';
  var isMobile = window.innerWidth <= 768;
  // Build header based on same column defs as render
  var cols = [
    {h:'☑',        a:1, m:0, d:0},
    {h:'商品编号', a:1, m:0, d:0},
    {h:'品类',     a:0, m:1, d:1},
    {h:'品牌',     a:0, m:1, d:1},
    {h:'款式名称', a:1, m:0, d:0},
    {h:'尺码',     a:1, m:0, d:0},
    {h:'颜色',     a:1, m:0, d:0},
    {h:'存放位置', a:0, m:1, d:1},
    {h:'当前库存', a:1, m:0, d:0},
    {h:'安全库存', a:0, m:1, d:1},
    {h:'状态',     a:0, m:1, d:1},
    {h:'建议补货', a:0, m:1, d:1},
    {h:isDaily?'补货':'进货', a:1, m:0, d:0},
    {h:'供应商',   a:0, m:1, d:1},
    {h:'成本单价', a:0, m:1, d:1},
    {h:'小计(SGD)',a:0, m:1, d:1}
  ];
  var vis = [];
  for (var i = 0; i < cols.length; i++) {
    if (isDaily && cols[i].d) continue;
    if (isMobile && cols[i].m) continue;
    vis.push(cols[i]);
  }
  var h = '';
  for (var i = 0; i < vis.length; i++) {
    h += '<th'+(i===0?' style="width:40px;"':'')+'>'+vis[i].h+'</th>';
  }
  document.querySelector('#skuTable thead tr').innerHTML = h;
}

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'a') { e.preventDefault(); selectAllNeeding(); }
  if (e.ctrlKey && e.key === 'g') { e.preventDefault(); generateList(); }
  if (e.ctrlKey && e.key === 'p') { e.preventDefault(); printList(); }
});

// Re-render on resize for mobile/desktop column switching
var resizeTimer = null;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function() { updateThead(); render(); }, 150);
});

init();
</script>
</body>
</html>
