<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>服装档口 · 补货工具</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: "Microsoft YaHei","PingFang SC","Segoe UI",sans-serif; background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 30%, #fef3c7 70%, #ecfdf5 100%); background-attachment: fixed; color:#444; min-height:100vh; }
.container { max-width:1200px; margin:0 auto; padding:20px; }

/* Header */
.header { background: white; border-radius:20px; padding:24px 30px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; box-shadow: 0 4px 20px rgba(236,72,153,0.1), 0 1px 3px rgba(0,0,0,0.04); border: 1px solid #fce7f3; }
.header h1 { font-size:24px; background: linear-gradient(135deg, #ec4899, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.header .date { font-size:14px; color:#999; }
.header-right { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

/* Stats bar */
.stats { display:flex; gap:14px; margin-bottom:20px; flex-wrap:wrap; }
.stat-card { flex:1; min-width:140px; background:white; border-radius:16px; padding:18px 16px; text-align:center; box-shadow: 0 2px 12px rgba(0,0,0,0.04); transition: transform 0.2s; border: 1px solid #f3f4f6; }
.stat-card:hover { transform: translateY(-2px); }
.stat-card .num { font-size:34px; font-weight:800; }
.stat-card .label { font-size:12px; color:#999; margin-top:4px; }
.stat-card.danger { border-left: 4px solid #f87171; }
.stat-card.danger .num { color:#ef4444; }
.stat-card.warning { border-left: 4px solid #fbbf24; }
.stat-card.warning .num { color:#f59e0b; }
.stat-card.success { border-left: 4px solid #34d399; }
.stat-card.success .num { color:#10b981; }
.stat-card.info { border-left: 4px solid #60a5fa; }
.stat-card.info .num { color:#3b82f6; }

/* Controls */
.controls { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
.controls label { font-size:13px; color:#888; font-weight:600; }
.btn { padding:8px 18px; border:none; border-radius:25px; cursor:pointer; font-size:13px; font-weight:600; transition:all 0.2s; letter-spacing:0.3px; }
.btn-primary { background: linear-gradient(135deg, #ec4899, #f43f5e); color:white; box-shadow: 0 3px 12px rgba(236,72,153,0.25); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(236,72,153,0.35); }
.btn-outline { background:white; border:2px solid #f9a8d4; color:#ec4899; }
.btn-outline:hover { background:#fdf2f8; border-color:#ec4899; }
.btn-green { background: linear-gradient(135deg, #34d399, #10b981); color:white; box-shadow: 0 3px 12px rgba(52,211,153,0.25); }
.btn-green:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(52,211,153,0.35); }
.btn-sm { padding:5px 14px; font-size:11px; }
select, input[type="text"], input[type="number"] { background:white; border:2px solid #f3f4f6; color:#444; padding:8px 14px; border-radius:25px; font-size:13px; transition:border-color 0.2s; }
select:focus, input:focus { outline:none; border-color:#f9a8d4; box-shadow: 0 0 0 3px rgba(249,168,212,0.15); }

/* Table */
.table-wrap { background:white; border-radius:20px; overflow:hidden; margin-bottom:20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.03); overflow-x:auto; -webkit-overflow-scrolling:touch; }
.table-wrap::after { content:''; position:sticky; right:0; top:0; bottom:0; width:24px; background:linear-gradient(90deg,transparent,rgba(236,72,153,0.06)); pointer-events:none; display:none; }
table { width:100%; border-collapse:collapse; min-width:900px; }
th { background: linear-gradient(180deg, #fdf2f8, #fce7f3); padding:14px 10px; text-align:left; font-size:11px; color:#be185d; text-transform:uppercase; letter-spacing:0.8px; position:sticky; top:0; z-index:1; border-bottom: 2px solid #fbcfe8; white-space:nowrap; }
td { padding:11px 10px; border-bottom:1px solid #fef3c7; font-size:13px; white-space:nowrap; }
td.wrap { white-space:normal; }
tr:nth-child(even) td { background:#fefce8; }
tr:hover td { background:#fdf2f8 !important; }
tr.selected td { background:#ffe4e6 !important; }
tr.group-header td { background: linear-gradient(90deg, #fce7f3, #fef3c7) !important; font-weight:bold; font-size:14px; color:#be185d; cursor:pointer; border-bottom: 1px solid #fbcfe8; }
tr.group-header td:hover { background: linear-gradient(90deg, #fbcfe8, #fde68a) !important; }

.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
.badge-danger { background:#fee2e2; color:#dc2626; }
.badge-warning { background:#fef3c7; color:#d97706; }
.badge-success { background:#d1fae5; color:#059669; }

.qty-input { width:60px; text-align:center; background:white; border:2px solid #fbcfe8; color:#444; padding:6px; border-radius:20px; font-size:14px; font-weight:700; }
.qty-input:focus { border-color:#ec4899; outline:none; box-shadow: 0 0 0 3px rgba(236,72,153,0.12); }
.qty-input:disabled { opacity:0.25; background:#f9fafb; }

.checkbox { width:20px; height:20px; accent-color:#ec4899; cursor:pointer; }

/* Summary */
.summary { background:white; border-radius:20px; padding:24px; margin-bottom:20px; display:none; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 2px solid #fce7f3; }
.summary.active { display:block; animation: fadeUp 0.3s ease; }
.summary h3 { color:#ec4899; margin-bottom:16px; font-size:17px; }
.summary-table { width:100%; border-collapse:collapse; margin-bottom:16px; }
.summary-table th { background:#fdf2f8; padding:10px 8px; font-size:11px; color:#be185d; border-radius:0; }
.summary-table td { padding:10px 8px; border-bottom:1px solid #fef3c7; font-size:13px; background:white; }
.summary-total { text-align:right; font-size:17px; color:#10b981; font-weight:800; margin-top:8px; background:#f0fdf4; padding:12px 16px; border-radius:12px; }

/* Toast */
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background: linear-gradient(135deg, #34d399, #10b981); color:white; padding:12px 28px; border-radius:30px; font-size:14px; font-weight:600; z-index:100; opacity:0; transition:opacity 0.3s; box-shadow: 0 4px 16px rgba(52,211,153,0.3); }
.toast.show { opacity:1; }
.toast.error { background: linear-gradient(135deg, #f87171, #ef4444); box-shadow: 0 4px 16px rgba(239,68,68,0.3); }

/* Print */
@media print {
  body { background:white; color:black; }
  .header, .stats, .controls, .btn, .checkbox, .qty-input, .summary, .toast, .no-print { display:none !important; }
  .table-wrap { background:white; border:1px solid #ccc; box-shadow:none; }
  th { background:#eee; color:black; }
  td { color:black; border-color:#ddd; }
  .badge-danger, .badge-warning, .badge-success { color:black; background:none; font-weight:bold; }
}

@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.empty-state { text-align:center; padding:40px; color:#999; }
.empty-state .icon { font-size:48px; margin-bottom:12px; }

/* === Mobile: portrait phones === */
@media (max-width: 768px) {
  .container { padding:10px; }
  
  /* Header */
  .header { padding:16px; border-radius:14px; flex-direction:column; align-items:stretch; }
  .header h1 { font-size:18px; }
  .header .date { font-size:12px; }
  .header-right { gap:6px; }
  .header-right .btn { flex:1; text-align:center; padding:8px 6px; font-size:11px; border-radius:20px; min-width:0; }
  .header-right .btn-sm { font-size:10px; padding:6px 8px; }
  
  /* Stats */
  .stats { gap:8px; }
  .stat-card { min-width:0; flex:1 1 calc(50% - 8px); padding:12px 8px; border-radius:12px; }
  .stat-card .num { font-size:26px; }
  .stat-card .label { font-size:10px; }
  
  /* Controls */
  .controls { gap:8px; }
  .controls label { font-size:11px; }
  .controls select { font-size:12px; padding:6px 10px; max-width:120px; }
  
  /* Table - scrollable */
  .table-wrap { border-radius:14px; }
  .table-wrap::after { display:block; }
  th { padding:10px 6px; font-size:9px; }
  td { padding:9px 6px; font-size:12px; }
  
  /* Touch-friendly checkboxes and inputs */
  .checkbox { width:24px; height:24px; }
  .qty-input { width:52px; font-size:15px; padding:8px 4px; }
  .badge { font-size:10px; padding:2px 7px; }
  
  /* Summary */
  .summary { padding:16px; border-radius:14px; }
  .summary h3 { font-size:15px; }
  .summary-table th, .summary-table td { font-size:11px; padding:6px 4px; }
  .summary-total { font-size:14px; }
  
  /* Buttons in summary */
  .summary .btn { font-size:12px; padding:8px 14px; }
  
  /* Print panel adjustments */
  .doc-header h1 { font-size:20px; }
  .doc-header .date { font-size:13px; }
}

/* === Very small phones === */
@media (max-width: 400px) {
  .container { padding:6px; }
  .header { padding:12px; border-radius:10px; }
  .header h1 { font-size:16px; }
  .header-right .btn { font-size:10px; padding:6px 4px; }
  .stat-card { padding:10px 6px; }
  .stat-card .num { font-size:22px; }
  .controls { flex-direction:column; gap:6px; }
  .controls select { max-width:100%; width:100%; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header no-print">
    <div>
      <h1>📦 服装档口 · 每日补货工具</h1>

      <button class="btn btn-outline btn-sm" onclick="toggleAllItems()">📋 切换全部SKU</button>

    <label>状态:</label>

      <option value="needs">仅需补货（缺货+不足）</option>

      <option value="out">仅缺货</option>
      <option value="low">仅不足</option>

  </div>

  <!-- SKU列表 -->
  <div class="table-wrap">
    <table id="skuTable">
      <thead>
        <tr>
          <th style="width:40px;">☑</th>
          <th>商品编号</th>
          <th>品类</th>
          <th>品牌</th>

          <th>尺码</th>
          <th>颜色</th>
          <th>存放位置</th>
          <th>当前库存</th>
          <th>安全库存</th>
          <th>状态</th>

          <th>本次补货</th>
          <th>供应商</th>
          <th>成本单价</th>
          <th>小计(SGD)</th>
        </tr>
      </thead>
      <tbody id="skuBody"></tbody>
    </table>
  </div>

  <!-- 补货汇总 -->
  <div class="summary no-print" id="summaryPanel">
    <h3>📋 本次补货清单</h3>
    <table class="summary-table" id="summaryTable"></table>
    <div class="summary-total" id="summaryTotal"></div>
    <div style="display:flex;gap:10px;margin-top:12px;">
      <button class="btn btn-green" onclick="copyAsText()">📋 复制为文本</button>
      <button class="btn btn-outline" onclick="downloadImage()">💾 保存图片</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

var inventory = [

  {"code":"UN-006","category":"内裤","brand":"Triumph","name":"蕾丝三角内裤(女)","size":"M","color":"粉色","location":"B架-3层","total_in":10,"sold":7,"current_stock":3,"safety":10,"suggested":17,"status":"不足"},

  {"code":"SK-005","category":"袜子","brand":"Happy Socks","name":"彩色棉袜(女)","size":"均码","color":"花色","location":"C架-3层","total_in":10,"sold":5,"current_stock":5,"safety":10,"suggested":15,"status":"不足"},
  {"code":"ST-001","category":"裤袜","brand":"Gunze","name":"发热保暖连裤袜","size":"M-L","color":"黑色","location":"D架-1层","total_in":8,"sold":2,"current_stock":6,"safety":5,"suggested":0,"status":"充足"},
  {"code":"ST-001","category":"裤袜","brand":"Gunze","name":"发热保暖连裤袜","size":"L-LL","color":"深灰","location":"","total_in":0,"sold":0,"current_stock":0,"safety":5,"suggested":10,"status":"缺货"},
  {"code":"ST-003","category":"裤袜","brand":"Atsugi","name":"压力美腿连裤袜","size":"M-L","color":"肤色","location":"D架-2层","total_in":5,"sold":1,"current_stock":4,"safety":3,"suggested":0,"status":"充足"}
];

var suppliers = {
  "BR-001":"Triumph SG","BR-002":"Triumph SG","BR-003":"Triumph SG",
  "BR-004":"Wacoal 代理","BR-005":"Wacoal 代理",
  "UN-001":"Byford 批发","UN-002":"Byford 批发","UN-003":"Byford 批发",
  "UN-004":"Renoma 总代","UN-005":"Renoma 总代",
  "UN-006":"Triumph SG","UN-007":"Triumph SG",
  "SK-001":"Goldlion 批发","SK-002":"Goldlion 批发",
  "SK-003":"Puma 经销商","SK-004":"Puma 经销商",
  "SK-005":"Happy Socks SG",
  "ST-001":"Gunze 日本","ST-002":"Gunze 日本",
  "ST-003":"Atsugi 代理"
};

var costs = {
  "BR-001":10.5,"BR-002":10.5,"BR-003":10.5,"BR-004":14,"BR-005":14,
  "UN-001":4.5,"UN-002":4.5,"UN-003":4.5,"UN-004":3.2,"UN-005":3.2,
  "UN-006":3.8,"UN-007":3.8,
  "SK-001":2.5,"SK-002":2.5,"SK-003":3,"SK-004":3,"SK-005":3.5,
  "ST-001":8,"ST-002":8,"ST-003":10
};

var showAll = false;
var selections = {}; // {index: qty}

// ===== INIT =====
function init() {
  document.getElementById('todayDate').textContent = '📅 ' + new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  // Populate category filter
  var cats = [...new Set(inventory.map(i=>i.category))];
  var selCat = document.getElementById('filterCategory');
  cats.forEach(c => { var o=document.createElement('option'); o.value=c; o.textContent=c; selCat.appendChild(o); });
  // Populate name filter
  var names = [...new Set(inventory.map(i=>i.name))];
  var selName = document.getElementById('filterName');
  names.forEach(n => { var o=document.createElement('option'); o.value=n; o.textContent=n; selName.appendChild(o); });
  render();
}

function getFilteredData() {
  var name = document.getElementById('filterName').value;
  var cat = document.getElementById('filterCategory').value;
  var status = document.getElementById('filterStatus').value;
  return inventory.filter(function(item) {
    if (name !== 'all' && item.name !== name) return false;
    if (cat !== 'all' && item.category !== cat) return false;
    if (status === 'needs') return item.current_stock < item.safety;
    if (status === 'out') return item.status === '缺货';
    if (status === 'low') return item.status === '不足';
    return true;
  });
}

function render() {
  var data = getFilteredData();
  var tbody = document.getElementById('skuBody');
  
  // Group by category
  var groups = {};
  data.forEach(function(item, idx) {
    if (!groups[item.category]) groups[item.category] = [];
    groups[item.category].push({item:item, origIdx:inventory.indexOf(item)});
  });

  var html = '';
  var catOrder = ['内衣','内裤','袜子','裤袜'];
  catOrder.forEach(function(cat) {
    if (!groups[cat]) return;
    var items = groups[cat];
    html += '<tr class="group-header" onclick="toggleCategory(this,\''+cat+'\')"><td colspan="16">📂 '+cat+' ('+items.length+' SKU)</td></tr>';
    items.forEach(function(entry) {
      var item = entry.item;
      var idx = entry.origIdx;
      var statusClass = item.status==='缺货'?'danger':item.status==='不足'?'warning':'success';
      var needsReplenish = item.current_stock < item.safety;
      var selected = selections[idx] !== undefined;
      var qty = selected ? selections[idx] : (needsReplenish ? item.suggested : 0);
      var cost = costs[item.code] || 0;
      var subtotal = (qty * cost).toFixed(2);
      html += '<tr class="sku-row cat-'+cat+' '+(selected?'selected':'')+'" data-idx="'+idx+'">';
      html += '<td><input type="checkbox" class="checkbox" '+(selected?'checked':'')+' onchange="toggleSelect('+idx+',this)" '+(!needsReplenish&&!showAll?'':'')+'></td>';
      html += '<td>'+item.code+'</td>';
      html += '<td>'+item.category+'</td>';
      html += '<td>'+item.brand+'</td>';
      html += '<td>'+item.name+'</td>';
      html += '<td>'+item.size+'</td>';
      html += '<td>'+item.color+'</td>';
      html += '<td>'+item.location+'</td>';
      html += '<td style="font-weight:bold;color:'+(item.current_stock<=0?'#ef4444':item.current_stock<item.safety?'#f59e0b':'#10b981')+'">'+item.current_stock+'</td>';
      html += '<td>'+item.safety+'</td>';
      html += '<td><span class="badge badge-'+statusClass+'">'+item.status+'</span></td>';
      html += '<td style="color:#f59e0b">'+(item.suggested > 0 ? item.suggested : '-')+'</td>';
      html += '<td><input type="number" class="qty-input" value="'+qty+'" min="0" '+(selected?'':'disabled')+' onchange="updateQty('+idx+',this.value)" onclick="event.stopPropagation()"></td>';
      html += '<td>'+ (suppliers[item.code] || '-') +'</td>';
      html += '<td>$'+cost.toFixed(2)+'</td>';
      html += '<td style="color:#10b981;font-weight:bold">$'+subtotal+'</td>';
      html += '</tr>';
    });
  });
  
  tbody.innerHTML = html;
  updateStats();
  updateSummary();
}

function toggleSelect(idx, cb) {
  if (cb.checked) {
    var item = inventory[idx];
    selections[idx] = item.suggested > 0 ? item.suggested : (item.safety - Math.max(0, item.current_stock));
  } else {
    delete selections[idx];
  }
  render();
}

function updateQty(idx, val) {
  var qty = parseInt(val) || 0;
  if (qty <= 0) {
    delete selections[idx];
  } else {
    selections[idx] = qty;
  }
  updateSummary();
  // Update subtotal cell
  var cost = costs[inventory[idx].code] || 0;
  var subtotal = (qty * cost).toFixed(2);
  var row = document.querySelector('tr[data-idx="'+idx+'"]');
  if (row) {
    var cells = row.querySelectorAll('td');
    cells[cells.length-1].textContent = '$'+subtotal;
  }
}

function updateStats() {
  var data = getFilteredData();
  var all = inventory;
  var outOfStock = all.filter(i=>i.status==='缺货').length;
  var lowStock = all.filter(i=>i.status==='不足').length;
  var adequate = all.filter(i=>i.status==='充足').length;
  var needReplenish = all.filter(i=>i.current_stock < i.safety).length;
  
  document.getElementById('statsBar').innerHTML = 
    '<div class="stat-card danger"><div class="num">'+outOfStock+'</div><div class="label">缺货 SKU</div></div>'+
    '<div class="stat-card warning"><div class="num">'+lowStock+'</div><div class="label">库存不足</div></div>'+
    '<div class="stat-card success"><div class="num">'+adequate+'</div><div class="label">库存充足</div></div>'+
    '<div class="stat-card info"><div class="num">'+needReplenish+'</div><div class="label">需补货合计</div></div>';
  
  var selCount = Object.keys(selections).length;
  document.getElementById('selectedCount').textContent = '已选补货: '+selCount+' 项';
}

function updateSummary() {
  var panel = document.getElementById('summaryPanel');
  var tbody = document.getElementById('summaryTable');
  var totalEl = document.getElementById('summaryTotal');
  
  var selected = Object.keys(selections).map(Number);
  if (selected.length === 0) {
    panel.classList.remove('active');
    return;
  }
  panel.classList.add('active');
  
  var html = '<tr><th>商品编号</th><th>款式</th><th>尺码</th><th>颜色</th><th>数量</th><th>成本单价</th><th>金额</th><th>供应商</th></tr>';
  var total = 0;
  selected.forEach(function(idx) {
    var item = inventory[idx];
    var qty = selections[idx];
    var cost = costs[item.code] || 0;
    var amt = qty * cost;
    total += amt;
    html += '<tr>';
    html += '<td>'+item.code+'</td><td>'+item.name+'</td><td>'+item.size+'</td><td>'+item.color+'</td>';
    html += '<td>'+qty+'</td><td>$'+cost.toFixed(2)+'</td><td>$'+amt.toFixed(2)+'</td>';
    html += '<td>'+ (suppliers[item.code]||'-') +'</td>';
    html += '</tr>';
  });
  tbody.innerHTML = html;
  totalEl.innerHTML = '💰 补货总成本: <span style="font-size:22px;">SGD $'+total.toFixed(2)+'</span> （'+selected.length+' 项）';
}

function toggleAllItems() {
  showAll = !showAll;
  document.getElementById('filterStatus').value = showAll ? 'all' : 'needs';
  render();
}

function selectAllNeeding() {
  var data = getFilteredData();
  data.forEach(function(item) {
    var idx = inventory.indexOf(item);
    if (item.current_stock < item.safety) {
      selections[idx] = item.suggested > 0 ? item.suggested : (item.safety - Math.max(0, item.current_stock));
    }
  });
  render();
}

function clearAll() {
  selections = {};
  render();
}

function generateList() {
  var selected = Object.keys(selections).map(Number);
  if (selected.length === 0) {
    showToast('请先勾选需要补货的SKU 🌸', true);
    return;
  }
  
  // Group by supplier
  var bySupplier = {};
  selected.forEach(function(idx) {
    var item = inventory[idx];
    var sup = suppliers[item.code] || '未指定供应商';
    if (!bySupplier[sup]) bySupplier[sup] = [];
    bySupplier[sup].push({item: item, qty: selections[idx], cost: costs[item.code] || 0});
  });
  
  var today = new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
  var totalItems = 0, totalCost = 0;
  
  // Build print document
  var printHTML = '<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>补货清单 - '+today+'</title>';
  printHTML += '<style>';
  printHTML += '*{margin:0;padding:0;box-sizing:border-box}';
  printHTML += 'body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;color:#333;padding:40px 50px;max-width:800px;margin:0 auto;background:#fff}';
  printHTML += '.doc-header{text-align:center;margin-bottom:30px;padding-bottom:20px;border-bottom:3px double #ec4899}';
  printHTML += '.doc-header h1{font-size:26px;color:#ec4899;margin-bottom:4px}';
  printHTML += '.doc-header .sub{font-size:14px;color:#999}';
  printHTML += '.doc-header .date{font-size:15px;color:#666;margin-top:8px;font-weight:600}';
  printHTML += '.supplier-group{margin-bottom:24px}';
  printHTML += '.supplier-group h2{font-size:16px;color:#be185d;background:#fdf2f8;padding:8px 14px;border-radius:8px;margin-bottom:10px}';
  printHTML += 'table{width:100%;border-collapse:collapse;margin-bottom:8px}';
  printHTML += 'th{background:#fce7f3;color:#9d174d;padding:8px 10px;font-size:11px;text-align:left;border-bottom:1px solid #fbcfe8}';
  printHTML += 'td{padding:9px 10px;font-size:13px;border-bottom:1px solid #fef3c7}';
  printHTML += 'tr:nth-child(even) td{background:#fefce8}';
  printHTML += '.num{text-align:center;font-weight:700}';
  printHTML += '.amt{text-align:right;font-weight:700;color:#10b981}';
  printHTML += '.group-total{text-align:right;font-size:13px;color:#888;padding:4px 10px}';
  printHTML += '.summary-box{background:#fdf2f8;border:2px solid #fbcfe8;border-radius:12px;padding:16px 20px;margin-top:24px}';
  printHTML += '.summary-box .row{display:flex;justify-content:space-between;font-size:14px;padding:4px 0}';
  printHTML += '.summary-box .total{font-size:20px;font-weight:800;color:#ec4899;margin-top:8px;padding-top:8px;border-top:1px dashed #fbcfe8}';
  printHTML += '.footer{text-align:center;color:#bbb;font-size:11px;margin-top:30px}';
  printHTML += '@media print{body{padding:20px 30px}}';
  printHTML += '</style></head><body>';
  
  // Header
  printHTML += '<div class="doc-header">';
  printHTML += '<h1>🛍️ 服装档口 · 补货清单</h1>';
  printHTML += '<div class="sub">Stock Replenishment Order</div>';
  printHTML += '<div class="date">📅 '+today+'</div>';
  printHTML += '</div>';
  
  // Items grouped by supplier
  var supOrder = Object.keys(bySupplier).sort();
  supOrder.forEach(function(sup) {
    var items = bySupplier[sup];
    var groupTotal = 0;
    
    printHTML += '<div class="supplier-group">';
    printHTML += '<h2>📦 '+sup+'</h2>';
    printHTML += '<table><thead><tr>';
    printHTML += '<th>商品编号</th><th>款式名称</th><th>尺码</th><th>颜色</th><th class="num">数量</th><th class="num">单价</th><th class="amt">金额</th>';
    printHTML += '</tr></thead><tbody>';
    
    items.forEach(function(entry) {
      var amt = entry.qty * entry.cost;
      groupTotal += amt;
      totalItems += entry.qty;
      printHTML += '<tr>';
      printHTML += '<td>'+entry.item.code+'</td>';
      printHTML += '<td>'+entry.item.name+'</td>';
      printHTML += '<td class="num">'+entry.item.size+'</td>';
      printHTML += '<td class="num">'+entry.item.color+'</td>';
      printHTML += '<td class="num">'+entry.qty+'</td>';
      printHTML += '<td class="num">$'+entry.cost.toFixed(2)+'</td>';
      printHTML += '<td class="amt">$'+amt.toFixed(2)+'</td>';
      printHTML += '</tr>';
    });
    
    printHTML += '</tbody></table>';
    printHTML += '<div class="group-total">小计: SGD $'+groupTotal.toFixed(2)+'</div>';
    printHTML += '</div>';
    
    totalCost += groupTotal;
  });
  
  // Summary box
  printHTML += '<div class="summary-box">';
  printHTML += '<div class="row"><span>补货 SKU 数</span><span>'+selected.length+' 项</span></div>';
  printHTML += '<div class="row"><span>补货总件数</span><span>'+totalItems+' 件</span></div>';
  printHTML += '<div class="row total"><span>💰 补货总成本</span><span>SGD $'+totalCost.toFixed(2)+'</span></div>';
  printHTML += '</div>';
  
  printHTML += '<div class="footer">服装档口管理模板 · 补货工具生成</div>';
  printHTML += '<script>window.onload=function(){window.print();}<'+'/script>';
  printHTML += '</body></html>';
  
  var w = window.open('', '_blank', 'width=900,height=700');
  w.document.write(printHTML);
  w.document.close();
  
  // Also update in-page summary
  updateSummary();
  showToast('补货清单已生成 → 请选择「另存为PDF」保存 🖨️');
}

function printList() {
  window.print();
}

function copyAsText() {
  var selected = Object.keys(selections).map(Number);
  if (selected.length === 0) return;
  var lines = ['日期\t商品编号\t款式名称\t尺码\t颜色\t补货数量\t成本单价\t金额\t供应商'];
  var total = 0;
  selected.forEach(function(idx) {
    var item = inventory[idx];
    var qty = selections[idx];
    var cost = costs[item.code] || 0;
    var amt = qty * cost;
    total += amt;
    lines.push(['', item.code, item.name, item.size, item.color, qty, cost.toFixed(2), amt.toFixed(2), suppliers[item.code]||''].join('\t'));
  });
  lines.push(['', '', '', '', '', '', '', total.toFixed(2), ''].join('\t'));
  navigator.clipboard.writeText(lines.join('\n')).then(function() {
    showToast('已复制到剪贴板 📋');
  }).catch(function() {
    showToast('复制失败，请手动选择表格', true);
  });
}

function downloadImage() {
  var selected = Object.keys(selections).map(Number);
  if (selected.length === 0) { showToast('请先勾选需要补货的SKU', true); return; }
  
  var today = new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
  var W = 780, rowH = 32, headerH = 36, padX = 16, padY = 20;
  var colX = [20, 100, 300, 360, 420, 490, 580, 680]; // column x positions
  var colW = [80, 200, 60, 60, 70, 90, 100, 80];
  var colNames = ['商品编号', '款式名称', '尺码', '颜色', '数量', '成本单价', '金额', '供应商'];
  var colAlign = ['left','left','center','center','center','center','right','left'];
  
  // Build row data
  var rows = [];
  var totalAmt = 0;
  selected.forEach(function(idx) {
    var item = inventory[idx];
    var qty = selections[idx];
    var cost = costs[item.code] || 0;
    var amt = qty * cost;
    totalAmt += amt;
    rows.push([item.code, item.name, item.size, item.color, String(qty), '$'+cost.toFixed(2), '$'+amt.toFixed(2), suppliers[item.code]||'-']);
  });
  
  var titleY = 55, tableY = 100;
  var tableH = headerH + rows.length * rowH;
  var summaryY = tableY + tableH + 24;
  var totalH = 120 + rows.length * rowH;
  
  // SVG namespace
  function svgTag(tag, attrs, content) {
    var s = '<'+tag;
    for (var k in attrs) s += ' '+k+'="'+attrs[k]+'"';
    if (content !== undefined) s += '>'+content+'</'+tag+'>';
    else s += '/>';
    return s;
  }
  
  var svg = '';
  svg += '<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+(summaryY+totalH)+'" style="background:#fff;font-family:Microsoft YaHei,PingFang SC,sans-serif">';
  
  // Title
  svg += svgTag('text', {x:String(W/2), y:String(titleY), 'text-anchor':'middle', 'font-size':'22', 'font-weight':'bold', fill:'#ec4899'}, '📋 服装档口 · 补货清单');
  svg += svgTag('text', {x:String(W/2), y:String(titleY+22), 'text-anchor':'middle', 'font-size':'13', fill:'#999'}, '📅 '+today);
  
  // Table background
  svg += svgTag('rect', {x:String(16), y:String(tableY), width:String(W-32), height:String(tableH), rx:'8', fill:'#fdf2f8'});
  
  // Header row
  svg += svgTag('rect', {x:String(16), y:String(tableY), width:String(W-32), height:String(headerH), rx:'8', fill:'#fce7f3'});
  svg += svgTag('rect', {x:String(16), y:String(tableY+headerH/2), width:String(W-32), height:String(headerH/2), fill:'#fce7f3'});
  
  for (var c = 0; c < 8; c++) {
    var ax = colAlign[c] === 'center' ? 'middle' : (colAlign[c] === 'right' ? 'end' : 'start');
    var tx = colAlign[c] === 'center' ? colX[c]+colW[c]/2 : (colAlign[c] === 'right' ? colX[c]+colW[c]-10 : colX[c]+10);
    svg += svgTag('text', {x:String(tx), y:String(tableY+22), 'text-anchor':ax, 'font-size':'11', 'font-weight':'bold', fill:'#be185d'}, colNames[c]);
  }
  
  // Data rows
  for (var r = 0; r < rows.length; r++) {
    var ry = tableY + headerH + r * rowH;
    if (r % 2 === 1) {
      svg += svgTag('rect', {x:String(16), y:String(ry), width:String(W-32), height:String(rowH), fill:'#fefce8'});
    }
    // Bottom border
    svg += svgTag('line', {x1:String(20), y1:String(ry+rowH), x2:String(W-20), y2:String(ry+rowH), stroke:'#fef3c7', 'stroke-width':'0.5'});
    
    for (var c = 0; c < 8; c++) {
      var ax = colAlign[c] === 'center' ? 'middle' : (colAlign[c] === 'right' ? 'end' : 'start');
      var tx = colAlign[c] === 'center' ? colX[c]+colW[c]/2 : (colAlign[c] === 'right' ? colX[c]+colW[c]-8 : colX[c]+8);
      var val = rows[r][c];
      var color = c === 6 ? '#10b981' : '#444';
      var fw = (c === 4 || c === 6) ? 'bold' : 'normal';
      svg += svgTag('text', {x:String(tx), y:String(ry+21), 'text-anchor':ax, 'font-size':'12', 'font-weight':fw, fill:color}, val);
    }
  }
  
  // Summary box
  var sby = tableY + tableH + 24;
  svg += svgTag('rect', {x:String(16), y:String(sby), width:String(W-32), height:'100', rx:'12', fill:'#fdf2f8', stroke:'#fbcfe8', 'stroke-width':'2'});
  svg += svgTag('text', {x:String(36), y:String(sby+32), 'font-size':'14', fill:'#666'}, '补货 SKU: '+selected.length+' 项');
  svg += svgTag('text', {x:String(36), y:String(sby+58), 'font-size':'14', fill:'#666'}, '补货总成本:');
  svg += svgTag('text', {x:String(200), y:String(sby+58), 'font-size':'22', 'font-weight':'bold', fill:'#ec4899'}, 'SGD $'+totalAmt.toFixed(2));
  
  svg += '</svg>';
  
  // Convert SVG to PNG via Canvas
  var canvas = document.createElement('canvas');
  canvas.width = W * 2;  // 2x for retina
  canvas.height = (summaryY + totalH) * 2;
  var ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  
  var img = new Image();
  var svgBlob = new Blob([svg], {type:'image/svg+xml;charset=utf-8'});
  var url = URL.createObjectURL(svgBlob);
  
  img.onload = function() {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, summaryY + totalH);
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    
    canvas.toBlob(function(blob) {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '补货清单_'+today.replace(/[年月]/g,'-').replace('日','')+'.png';
      a.click();
      showToast('图片已保存 💾');
    }, 'image/png');
  };
  
  img.onerror = function() {
    showToast('生成失败，请尝试截图保存', true);
  };
  
  img.src = url;
}

function toggleCategory(el, cat) {
  var rows = document.querySelectorAll('.cat-'+cat);
  var hidden = rows[0] && rows[0].style.display === 'none';
  rows.forEach(function(r) { r.style.display = hidden ? '' : 'none'; });
  el.querySelector('td').textContent = (hidden ? '📂' : '📁') + ' '+cat+' ('+rows.length+' SKU)';
}

function showToast(msg, isError) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast '+(isError?'error':'')+' show';
  setTimeout(function(){ t.className = 'toast'; }, 2000);
}

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'a') { e.preventDefault(); selectAllNeeding(); }
  if (e.ctrlKey && e.key === 'g') { e.preventDefault(); generateList(); }
  if (e.ctrlKey && e.key === 'p') { e.preventDefault(); printList(); }
});

init();
</script>
